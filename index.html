<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>燕云十六声 · 涅槃港</title>
    <meta name="music-credit" content="Wuxia series by PeriTune, CC BY 4.0, https://peritune.com/" />
    <link rel="canonical" href="http://trixy1900.cn/" />
    <link rel="stylesheet" href="styles.css?v=20260531h" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js?v=20260531h"></script>
    <script src="app.js?v=20260531h" defer></script>
  </head>
  <body>
    <audio
      id="siteBgm"
      data-src="assets/bgm.mp3"
      data-playlist="assets/bgm.mp3,assets/bgm/wuxia.mp3,assets/bgm/wuxia2-guzheng-pipa.mp3,assets/bgm/wuxia3.mp3"
      preload="auto"
      title="BGM: Wuxia series by PeriTune, CC BY 4.0"
    ></audio>
    <button class="music-toggle" id="musicToggle" type="button" aria-label="播放背景音乐" title="播放背景音乐">♪</button>
    <main class="harbor-screen" aria-live="polite">
      <div class="wash wash-left"></div>
      <div class="wash wash-right"></div>
      <div class="grain"></div>

      <header class="topbar">
        <section class="brand" aria-label="涅槃港">
          <span class="brand-mark">槃</span>
          <div>
            <p class="eyebrow">燕云十六声 · 百业</p>
            <h1>涅槃港</h1>
          </div>
        </section>

        <section class="leaders" aria-label="社团职位">
          <article>
            <span>社主</span>
            <strong>江都夷</strong>
          </article>
          <article>
            <span>副社主</span>
            <strong>晟楊</strong>
          </article>
          <button class="admin-open" id="selfOpen" type="button">名册管理</button>
        </section>
      </header>

      <section class="stage" id="memberStage">
        <div class="stage-copy">
          <p class="section-kicker">当前聚焦</p>
          <h2 id="memberName">江都夷</h2>
          <p class="role-line" id="memberRole">社主</p>
          <p class="quote" id="memberQuote">知我罪我，其惟春秋。</p>
          <div class="tag-row" id="memberTags"></div>
        </div>

        <div class="portrait-wrap">
          <div class="halo"></div>
          <img id="memberPortrait" class="portrait" src="assets/jiangduyi-portrait.png" alt="江都夷角色形象" />
          <div class="gold-stroke"></div>
        </div>

        <aside class="profile-panel" aria-label="成员档案">
          <p>涅槃港名册</p>
          <strong id="memberIndex">01</strong>
          <span id="memberTotal">/ 04</span>
          <div class="progress"><i id="cycleProgress"></i></div>
        </aside>
      </section>

      <nav class="roster" aria-label="成员列表">
        <div class="roster-head">
          <span>社众</span>
          <b id="rosterCount">0</b>
          <button id="directoryOpen" type="button">全员名册</button>
          <button id="alumniOpen" type="button">旧友录</button>
        </div>
        <div class="member-track" id="memberRoster"></div>
      </nav>

      <section class="directory-panel" id="directoryPanel" aria-hidden="true">
        <div class="directory-dialog" role="dialog" aria-modal="true" aria-labelledby="directoryTitle">
          <header class="directory-head">
            <div>
              <p class="eyebrow">百业全员</p>
              <h3 id="directoryTitle">涅槃港名册</h3>
            </div>
            <label class="directory-search">
              <span>搜索</span>
              <input id="directorySearch" type="search" placeholder="输入成员名、职位或标签" />
            </label>
            <button class="directory-close" id="directoryClose" type="button" aria-label="关闭全员名册">×</button>
          </header>
          <div class="directory-grid" id="directoryGrid"></div>
        </div>
      </section>

      <section class="directory-panel" id="alumniPanel" aria-hidden="true">
        <div class="directory-dialog" role="dialog" aria-modal="true" aria-labelledby="alumniTitle">
          <header class="directory-head">
            <div>
              <p class="eyebrow">旧游仍在</p>
              <h3 id="alumniTitle">涅槃港旧友录</h3>
            </div>
            <p class="alumni-note">曾同行于百业，后来各奔江湖，名字仍留在港内。</p>
            <button class="directory-close" id="alumniClose" type="button" aria-label="关闭旧友录">×</button>
          </header>
          <div class="directory-grid" id="alumniGrid"></div>
        </div>
      </section>

      <section class="admin-panel" id="adminPanel" aria-hidden="true">
        <div class="admin-dialog" role="dialog" aria-modal="true" aria-labelledby="adminTitle">
          <header class="admin-head">
            <div>
              <p class="eyebrow">涅槃港后台</p>
              <h3 id="adminTitle">名册管理</h3>
            </div>
            <button class="admin-close" id="adminClose" type="button" aria-label="关闭名册管理">×</button>
          </header>

          <div class="admin-grid">
            <aside class="admin-list">
              <button class="admin-add" id="adminAdd" type="button">新成员</button>
              <div id="adminMemberList"></div>
            </aside>

            <form class="admin-form" id="adminForm">
              <label>
                游戏 ID
                <input id="adminName" name="name" type="text" required placeholder="例如：江都夷" />
              </label>
              <label>
                职位
                <input id="adminRole" name="role" type="text" required placeholder="例如：社众" />
              </label>
              <label>
                名册状态
                <select id="adminStatusType" name="status">
                  <option value="active">现役成员</option>
                  <option value="alumni">旧友成员</option>
                </select>
              </label>
              <label>
                标签
                <input id="adminTags" name="tags" type="text" placeholder="用逗号分隔，例如：见道修,涅槃港" />
              </label>
              <label>
                角色短句
                <textarea id="adminQuote" name="quote" rows="3" placeholder="一句成员宣言"></textarea>
              </label>
              <div class="admin-files">
                <label>
                  头像图
                  <input id="adminAvatar" name="avatar" type="file" accept="image/*" />
                </label>
                <label>
                  角色展示图
                  <input id="adminPortrait" name="portrait" type="file" accept="image/*" />
                </label>
              </div>
              <div class="admin-actions">
                <button type="submit">保存到页面</button>
                <button id="adminDelete" type="button">删除成员</button>
                <button id="adminExport" type="button">导出数据</button>
              </div>
            </form>

            <aside class="admin-publish">
              <p>本地保存只会更新你当前浏览器。要让所有成员看到，请发布到 GitHub Pages。</p>
              <label>
                GitHub Token
                <input id="githubToken" type="password" autocomplete="off" placeholder="只临时用于发布，不写入网页" />
              </label>
              <button id="adminPublish" type="button">发布到 GitHub</button>
              <output id="adminStatus">等待操作</output>
            </aside>
          </div>
        </div>
      </section>

      <section class="self-panel" id="selfPanel" aria-hidden="true">
        <div class="self-dialog" role="dialog" aria-modal="true" aria-labelledby="selfTitle">
          <header class="admin-head">
            <div>
              <p class="eyebrow">涅槃港云端名册</p>
              <h3 id="selfTitle">名册管理</h3>
            </div>
            <button class="admin-close" id="selfClose" type="button" aria-label="关闭名册管理">×</button>
          </header>

          <div class="self-grid">
            <section class="self-card">
              <h4>登录</h4>
              <p>成员用自己的邮箱注册或登录后，可以维护自己的游戏 ID、角色短句和角色图。</p>
              <label>
                邮箱
                <input id="selfEmail" type="email" autocomplete="email" placeholder="name@example.com" />
              </label>
              <label>
                密码
                <input id="selfPassword" type="password" autocomplete="current-password" placeholder="至少 6 位" />
              </label>
              <div class="self-actions">
                <button id="selfLogin" type="button">登录</button>
                <button id="selfSignup" type="button">注册</button>
                <button id="selfLogout" type="button">退出</button>
              </div>
              <output id="selfAuthStatus">等待连接云端后台</output>
            </section>

            <form class="self-card self-form" id="selfForm">
              <h4>我的角色资料</h4>
              <label>
                游戏 ID
                <input id="selfName" name="name" type="text" required placeholder="例如：江都夷" />
              </label>
              <label>
                职位 / 备注
                <input id="selfRole" name="role" type="text" placeholder="例如：社众" />
              </label>
              <label>
                名册归属
                <select id="selfStatusType" name="status">
                  <option value="active">现役成员</option>
                  <option value="alumni">旧成员 / 旧友录</option>
                </select>
              </label>
              <label>
                标签
                <input id="selfTags" name="tags" type="text" placeholder="用逗号分隔，例如：输出,外观党,涅槃港" />
              </label>
              <label>
                角色短句
                <textarea id="selfQuote" name="quote" rows="3" placeholder="一句想放在网页上的话"></textarea>
              </label>
              <div class="admin-files">
                <label>
                  头像图
                  <input id="selfAvatar" name="avatar" type="file" accept="image/*" />
                </label>
                <label>
                  角色展示图
                  <input id="selfPortrait" name="portrait" type="file" accept="image/*" />
                </label>
              </div>
              <button id="selfSave" type="submit">保存到云端</button>
              <output id="selfSaveStatus">保存后会自动公开到大屏名册。</output>
            </form>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
